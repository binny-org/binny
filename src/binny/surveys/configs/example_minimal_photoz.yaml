# Example survey config schema for a minimal photo-z survey

# True-redshift grid on which all n(z) and tomographic bins are evaluated
z_grid: {start: 0.0, stop: 3.0, n: 301}

tomography:
  - role: lens  # galaxy sample used as lenses
    year: "1"  # survey year / scenario label
    kind: photoz  # photometric-redshift binning

    nz:  # underlying true-redshift distribution of the sample
      model: smail  # analytic Smail n(z) model
      params:
        z0: 0.5  # characteristic redshift (controls peak location)
        alpha: 2.0  # high-z fall-off of the distribution
        beta: 1.0  # low-z rise of the distribution

    bins:  # tomographic binning in observed (photo-z) space
      scheme: equidistant
      n_bins: 4  # number of photo-z bins

    uncertainties:  # photometric redshift uncertainty model
      scatter_scale: 0.05  # fractional redshift scatter: sigma(z) = 0.05 * (1 + z)
      mean_offset: 0.01  # systematic photo-z bias shift of the mean z
