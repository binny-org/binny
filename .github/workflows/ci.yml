name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      # ---------------------------
      # Checkout repo
      # ---------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------
      # Setup Python
      # ---------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # ---------------------------
      # Install package + dev deps
      # ---------------------------
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      # ---------------------------
      # Linting
      # ---------------------------
      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .

      # ---------------------------
      # Tests + coverage
      # ---------------------------
      - name: Tests (pytest)
        run: |
          pytest \
            --cov=binny \
            --cov-report=term-missing \
            --cov-report=xml

      # ---------------------------
      # Upload coverage to Codecov
      # (only once to avoid duplicates)
      # ---------------------------
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          verbose: true
          # token: ${{ secrets.CODECOV_TOKEN }}   # ← add if repo is private or upload fails